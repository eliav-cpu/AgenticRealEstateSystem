[pytest]
# Pytest configuration for AgenticRealEstateSystem

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Console output
console_output_style = progress
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    asyncio: Asynchronous tests
    slow: Slow running tests (>5 seconds)
    mock: Tests using mock data
    real: Tests requiring real API connections (skipped by default)

# Asyncio configuration
asyncio_mode = auto

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */conftest.py
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
